<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spacecraft ECS Skills — Compact Tree</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F2F4F7; --white:#FFFFFF; --navy:#0D1F3C; --slate:#374151; --muted:#9CA3AF; --div:#E2E6EA;
  --t1:#D95E2B; --t1l:#FDF0EA;
  --t2:#C98B0A; --t2l:#FEF7E0;
  --t3:#1B6FB5; --t3l:#E4EFF9;
  --t4:#0B9668; --t4l:#DFF5EE;
  --t5:#6537A3; --t5l:#EEE8F8;
  --tt:#0E7490; --ttl:#E0F7FA;
  --ta:#2C6E8A; --tal:#E3F2F8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--slate);min-height:100vh;}

/* ── HEADER ── */
.page-header{background:var(--navy);padding:24px 40px 20px;border-bottom:3px solid var(--t3);display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;}
.eyebrow{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--t3);text-transform:uppercase;margin-bottom:7px;}
.page-header h1{font-size:18px;font-weight:600;color:#fff;line-height:1.3;}
.page-header h1 span{color:var(--t3);}
.view-toggle{display:flex;gap:8px;align-items:center;}
.view-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--t3);border:1px solid rgba(27,111,181,0.4);border-radius:3px;padding:3px 9px;text-transform:uppercase;}

/* ── LAYOUT: two-column for engineering + parallel tracks ── */
.layout{display:grid;grid-template-columns:1fr 340px;gap:0;max-width:1480px;margin:0 auto;}
.main-col{padding:28px 24px 60px 32px;border-right:1px solid var(--div);}
.side-col{padding:28px 24px 60px 20px;background:var(--white);}

/* ── TIER BLOCK ── */
.tier-block{margin-bottom:32px;}
.tier-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.tier-pill{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:1.5px;color:#fff;padding:3px 10px;border-radius:3px;flex-shrink:0;}
.tier-title{font-size:11.5px;font-weight:600;color:var(--navy);letter-spacing:.5px;text-transform:uppercase;}
.tier-line{flex:1;height:1px;background:var(--div);}
.tier-prereq-tag{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);padding:2px 8px;border:1px solid var(--div);border-radius:3px;background:var(--white);white-space:nowrap;}

/* ── GROUP ── */
.group-block{margin-bottom:8px;}
.group-label{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:8px;}
.group-label-rule{flex:1;height:1px;background:var(--div);}

/* ── TREE ROW ── */
.tree-nodes{display:flex;flex-wrap:wrap;gap:4px;}

.node{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px 4px 8px;
  border-radius:3px;
  font-size:11px;font-weight:500;
  color:var(--navy);
  background:var(--white);
  border:1px solid var(--div);
  border-left:3px solid;
  cursor:default;
  transition:box-shadow .15s, transform .15s;
  white-space:nowrap;
}
.node:hover{box-shadow:0 3px 10px rgba(0,0,0,0.09);transform:translateY(-1px);}
.node.is-test{border-style:dashed;border-left-style:solid;}
.node.is-analysis{background:#FAFAFE;}
.node .ntype{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.5px;padding:1px 4px;border-radius:2px;opacity:.85;}

/* ── SIDE TRACK ── */
.side-track{margin-bottom:28px;}
.track-hdr{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:5px 10px;border-radius:3px;margin-bottom:12px;font-weight:500;}
.side-group-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;margin-top:10px;}
.side-nodes{display:flex;flex-direction:column;gap:3px;}
.side-node{
  padding:5px 10px 5px 10px;
  border-radius:3px;
  font-size:11px;font-weight:500;
  color:var(--navy);
  background:var(--white);
  border:1px solid var(--div);
  border-left:3px solid;
  cursor:default;
  transition:box-shadow .15s;
  display:flex;align-items:center;gap:6px;
}
.side-node:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.side-node .ntype{font-family:'DM Mono',monospace;font-size:7px;padding:1px 4px;border-radius:2px;letter-spacing:.5px;}

/* ── TOOLTIP ── */
.tooltip{position:fixed;z-index:999;background:var(--navy);color:#e2e8f0;border-radius:5px;padding:10px 14px;max-width:270px;font-size:11px;line-height:1.6;pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .13s,transform .13s;box-shadow:0 6px 20px rgba(0,0,0,0.25);}
.tooltip.show{opacity:1;transform:translateY(0);}
.tt-title{font-weight:600;color:#fff;margin-bottom:3px;font-size:11.5px;}
.tt-tag{font-family:'DM Mono',monospace;font-size:9px;color:#94a3b8;margin-bottom:4px;}
.tt-prereq{margin-top:6px;font-family:'DM Mono',monospace;font-size:9.5px;color:#94a3b8;}

/* ── ECE PREREQ BANNER ── */
.prereq-banner{
  display:flex;align-items:flex-start;gap:10px;
  background:#F8F9FA;border:1px solid var(--div);border-left:3px solid #9CA3AF;
  border-radius:3px;padding:8px 12px;margin-bottom:10px;
}
.prereq-banner-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;color:#6B7280;text-transform:uppercase;white-space:nowrap;padding-top:1px;}
.prereq-banner-body{font-size:10.5px;color:#6B7280;line-height:1.55;}
.prereq-banner-body strong{color:#374151;font-weight:600;}

@media(max-width:900px){.layout{grid-template-columns:1fr;}.side-col{border-top:1px solid var(--div);}}
</style>
</head>

<script>

const TIERS = [
  {
    num:1, color:"#D95E2B", light:"#FDF0EA", label:"FOUNDATIONAL KNOWLEDGE — SPACE & ROCKET SPECIFIC", prereq:"ECE/EE degree assumed",
    prereqBanner:"ECE/EE degree prerequisites assumed — circuit theory (KVL/KCL, Thevenin/Norton, AC/DC), analog & digital electronics, op-amps, MOSFETs, processor architectures, embedded C, FPGA basics (LUT/timing/clock domains), software version control, and standard lab instrumentation. Skills below are space- and launch-vehicle-specific additions beyond degree coverage.",
    groups:[
      { label:"Spacecraft & Launch Vehicle Bus Protocols", nodes:[
        { type:"design", title:"Spacecraft Bus Protocols",           tag:"RS-422, SpaceWire, MIL-STD-1553, CAN FD",  desc:"Spacecraft-specific bus protocols beyond standard ECE: RS-422 differential links, SpaceWire (ECSS-E-ST-50-12), MIL-STD-1553 BC/RT/BM, CAN FD for launch vehicle use. Focus on fault-tolerant topology and protocol framing.", prereq:"Digital logic, embedded C (degree)" },
        { type:"design", title:"RTOS for Space Applications",        tag:"RTEMS, FreeRTOS-MPU, scheduling, FDIR tasks",desc:"Space-grade RTOS use beyond introductory concepts: RTEMS configuration, FreeRTOS-MPU for memory protection, priority ceiling, FDIR task architecture, deterministic worst-case execution time (WCET) analysis.", prereq:"RTOS concepts (degree)" },
        { type:"design", title:"PCB Schematic Reading (Space-Grade)",tag:"ECSS net naming, EMC shields, hi-rel symbols", desc:"Space-specific schematic conventions: ECSS-compliant net naming, redundant signal paths, EMC shielding symbols, safety-critical annotation, hi-rel component reference designator conventions.", prereq:"Schematic reading (degree)" },
      ]},
      { label:"Space Environment & Standards", nodes:[

        { type:"analysis", title:"Thermal & Vacuum Environment",     tag:"Eclipse cycles, radiator sizing, outgassing",desc:"Orbital thermal environment, eclipse fractions, basic radiator sizing, outgassing rules.", prereq:"None" },
        { type:"analysis", title:"Electromagnetic Environment",      tag:"EMI sources, grounding philosophy",         desc:"Space EMI sources, conducted/radiated emission paths, cable shielding fundamentals — extends degree EMC theory to space-specific threat environments.", prereq:"AC signal theory (degree)" },
        { type:"design", title:"ECSS Standards Overview",          tag:"ECSS-E, ECSS-Q, ECSS-M",                  desc:"Structure and applicability of ECSS standard families.", prereq:"None" },

        { type:"design", title:"Part Classification & Screening",  tag:"EEE-INST-002, MIL-PRF-38535, upscreening", desc:"Space/mil/industrial part grades, lot acceptance, part approval lists, upscreening.", prereq:"ECSS Overview" },

  color:"#2C6E8A", light:"#E3F2F8", label:"GOVERNMENT ADMINISTRATIVE TRACK",
  note:"Parallel — applicable at all tiers",
  groups:[
    { label:"Government Administrative Skills", nodes:[
      { type:"admin",  title:"Complete Staff Work (CSW)",            tag:"Decision-ready briefs, CSW checklist",      desc:"CSW: decision-ready documents with problem, analysis, recommended action, and alternatives.", prereq:"None" },
      { type:"admin",  title:"Technical Memo & Brief Writing",       tag:"Memo format, exec summary, action paragraphs",desc:"Technical memos: heading formats, executive summaries, numbered action paragraphs, annexes.", prereq:"None" },
      { type:"admin",  title:"PPMP Submission & Management",         tag:"PPMP, budget allocation, BAC coordination",  desc:"PPMP preparation and tracking: budget per item, GPPB compliance, actual vs. planned, BAC coordination.", prereq:"None" },
      { type:"admin",  title:"Purchase Request (PR) Submission",     tag:"PR form, ABC, specs, RA 12009 & IRR",       desc:"PR preparation: technical specs, ABC establishment, justification docs, routing under RA 12009 and its IRR.", prereq:"PPMP Submission" },
      { type:"admin",  title:"Procurement Compliance (RA 12009 & IRR)",tag:"BAC, PhilGEPS, SVP, bidding docs",         desc:"RA 12009 and IRR procurement: BAC roles, PhilGEPS posting, SVP thresholds, bidding document preparation.", prereq:"PR Submission" },
      { type:"admin",  title:"Technical Specifications Writing",     tag:"Performance specs, acceptance criteria, TOR", desc:"Procurement specs: performance vs. design specs, measurable acceptance criteria, TOR/SOW writing.", prereq:"Complete Staff Work" },
    ]},
  ]
};

// ── BUILD ──────────────────────────────────────────────────────────────────────
function makeNode(node, color, light, isSide=false){
  const tm = TYPE_META[node.type] || TYPE_META.design;
  const el = document.createElement("div");
  el.className = (isSide ? "side-node" : "node") + (node.type==="test" ? " is-test" : "") + (node.type==="analysis" ? " is-analysis" : "");
  el.style.borderLeftColor = color;
  el.innerHTML = `<span class="ntype" style="background:${tm.bg};color:${tm.color}">${tm.label}</span>${node.title}`;
  el.addEventListener("mouseenter", e=>showTip(e,node,color,tm));
  el.addEventListener("mousemove", moveTip);
  el.addEventListener("mouseleave", hideTip);
  return el;
}

function buildMain(){
  const main = document.getElementById("main");

  TIERS.forEach(tier=>{
    const block = document.createElement("div");
    block.className = "tier-block";

    const hdr = document.createElement("div");
    hdr.className = "tier-hdr";
    hdr.innerHTML = `<div class="tier-pill" style="background:${tier.color}">T${tier.num}</div>
      <div class="tier-title">${tier.label}</div>
      <div class="tier-line"></div>
      <div class="tier-prereq-tag">${tier.prereq}</div>`;
    block.appendChild(hdr);

    if(tier.prereqBanner){
      const banner = document.createElement("div");
      banner.className = "prereq-banner";
      banner.innerHTML = `<span class="prereq-banner-label">ECE prereqs</span><span class="prereq-banner-body">${tier.prereqBanner}</span>`;
      block.appendChild(banner);
    }

    tier.groups.forEach(g=>{
      const gb = document.createElement("div");
      gb.className = "group-block";
      if(g.label){
        const gl = document.createElement("div");
        gl.className = "group-label";
        gl.innerHTML = `<span>${g.label}</span><span class="group-label-rule"></span>`;
        gb.appendChild(gl);
      }
      const row = document.createElement("div");
      row.className = "tree-nodes";
      g.nodes.forEach(n=>row.appendChild(makeNode(n, tier.color, tier.light)));
      gb.appendChild(row);
      block.appendChild(gb);
    });

    main.appendChild(block);
  });
}

function buildSide(){
  const side = document.getElementById("side");

  [TECH_TRACK, ADMIN_TRACK].forEach(track=>{
    const wrap = document.createElement("div");
    wrap.className = "side-track";

    const hdr = document.createElement("div");
    hdr.className = "track-hdr";
    hdr.style.cssText = `background:${track.light};color:${track.color};border:1px solid ${track.color}33;`;
    hdr.textContent = `⊕ ${track.label}`;
    wrap.appendChild(hdr);

    const noteEl = document.createElement("div");
    noteEl.style.cssText = `font-family:'DM Mono',monospace;font-size:8.5px;color:${track.color};margin-bottom:10px;letter-spacing:.5px;`;
    noteEl.textContent = track.note;
    wrap.appendChild(noteEl);

    track.groups.forEach(g=>{
      if(g.label){
        const gl = document.createElement("div");
        gl.className = "side-group-label";
        gl.textContent = g.label;
        wrap.appendChild(gl);
      }
      const sn = document.createElement("div");
      sn.className = "side-nodes";
      g.nodes.forEach(n=>sn.appendChild(makeNode(n, track.color, track.light, true)));
      wrap.appendChild(sn);
    });

    side.appendChild(wrap);
  });
}

buildMain();
buildSide();

// Tooltip
const tip=document.getElementById("tooltip"),ttT=document.getElementById("tt-title"),
      ttTag=document.getElementById("tt-tag"),ttB=document.getElementById("tt-body"),ttP=document.getElementById("tt-prereq");

function showTip(e,node,color,tm){
  ttT.textContent=node.title; ttT.style.color=color;
  ttTag.textContent=node.tag;
  ttB.textContent=node.desc;
  ttP.textContent=node.prereq&&node.prereq!=="None"?`→ Requires: ${node.prereq}`:"→ Entry level";
  tip.classList.add("show"); moveTip(e);
}
function moveTip(e){
  const x=e.clientX+14,y=e.clientY-8;
  tip.style.left=(x+280>innerWidth?x-294:x)+"px";
  tip.style.top=(y+160>innerHeight?y-150:y)+"px";
}
function hideTip(){tip.classList.remove("show");}
</script>
</body>
